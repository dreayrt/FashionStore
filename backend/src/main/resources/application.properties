spring.application.name=FashionStore
spring.config.import=optional:file:./.env[.properties]


# Ensure UTF-8 encoding throughout (already configured below, kept for reference)
# server.servlet.encoding.charset=UTF-8 is already set below

# JDBC MySQL connection
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.tomcat.uri-encoding=UTF-8
spring.messages.encoding=UTF-8

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#SEPAY
sepay.bank=${SEPAY_BANK}
sepay.account=${SEPAY_ACCOUNT}
sepay.webhook.token=${WEBHOOK_TOKEN_SEPAY}

#cloudflare r2
app.r2.public-url=${R2_PUBLIC_PATH}
r2.endpoint=${R2_ENDPOINT}
r2.access-key=${R2_ACCESSKEY}
r2.secret-key=${R2_SECRETKEY}
r2.bucket=${R2_BUCKET}

#deploy railway
server.port=${PORT:8080}

